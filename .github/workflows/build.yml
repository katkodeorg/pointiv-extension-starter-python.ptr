name: Build WASM

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install componentize-py pointiv-extension-sdk

      - name: Build
        run: componentize-py -d src -w extension.wasm componentize main execute

      - name: Commit updated extension.wasm
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: update extension.wasm [ci skip]"
          file_pattern: extension.wasm
