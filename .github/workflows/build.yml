name: Build WASM

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install binaryen
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Install extism-py
        run: |
          curl -Ls -o /tmp/extism-py-install.sh https://raw.githubusercontent.com/extism/python-pdk/main/install.sh
          bash /tmp/extism-py-install.sh

      - name: Build
        run: ./build.sh

      - name: Commit updated extension.wasm
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: update extension.wasm [ci skip]"
          file_pattern: extension.wasm
